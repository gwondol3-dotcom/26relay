<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWEET & AIDA 릴레이 연수 안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="antialiased min-h-screen text-slate-800">
    
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl shadow-lg">
                    S
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800">SWEET & AIDA</h1>
                    <p class="text-xs text-slate-500">강원 SW·AI교육연구회</p>
                </div>
            </div>
            <a href="https://gw1.kr/relay2026" target="_blank" class="hidden md:inline-flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-full text-sm font-medium transition-colors">
                <i class="fas fa-link"></i> gw1.kr/relay2026
            </a>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="relative pt-16 pb-20 lg:pt-24 lg:pb-28 overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5"></div>
        <div class="absolute top-0 inset-x-0 h-40 bg-gradient-to-b from-blue-50 to-transparent"></div>
        <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center flex flex-col items-center">
            <span class="inline-block py-1 px-3 rounded-full bg-blue-100 text-blue-700 text-sm font-semibold mb-4 border border-blue-200">2026 시즌</span>
            <h2 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">
                <span class="gradient-text">SWEET & AIDA</span><br />
                릴레이 연수 안내
            </h2>
            <p class="mt-4 max-w-2xl text-lg text-slate-600 mx-auto">
                미래 교육을 선도하는 선생님들을 위한 다채로운 SW·AI 교육 연수가 매월 진행됩니다. 함께 배우고 성장하는 자리에 초대합니다.
            </p>
        </div>
    </section>

    <!-- Schedule Table Section -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
        <div class="glass-card rounded-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white">
                <h3 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <i class="far fa-calendar-alt text-blue-500"></i> 월별 연수 일정
                </h3>
                <div class="flex gap-2">
                    <span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full flex items-center gap-1"><i class="fas fa-video"></i> 온라인</span>
                    <span class="px-3 py-1 bg-orange-100 text-orange-700 text-xs font-bold rounded-full flex items-center gap-1"><i class="fas fa-users"></i> 오프라인</span>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-sm uppercase tracking-wider border-b border-slate-200">
                            <th class="px-6 py-4 font-semibold">구분</th>
                            <th class="px-6 py-4 font-semibold">일시</th>
                            <th class="px-6 py-4 font-semibold">강사 / 소속</th>
                            <th class="px-6 py-4 font-semibold">주제</th>
                            <th class="px-6 py-4 font-semibold text-center">참여 방법</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 bg-white" id="schedule-body">
                        <!-- JS will populate rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <footer class="bg-slate-800 text-slate-300 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="mb-2">© 2026 강원 SW·AI교육연구회 (SWEET & AIDA). All rights reserved.</p>
            <p class="text-sm text-slate-400">이 페이지는 연구회 릴레이 연수 안내를 위해 제작되었습니다.</p>
        </div>
    </footer>

    <script>
        const scheduleData = [
            { month: '5월', date: '2026. 5. 28. (목)', time: '15:00~16:30', school: '온정초등학교', name: '김수한', title: 'AI 기반 캔바 활용법', method: '온라인', link: 'https://meet.google.com/bfi-taaq-kuw' },
            { month: '6월', date: '2026. 6. 25. (목)', time: '15:00~16:30', school: '남산초등학교', name: '구송희', title: 'NotebookLM 활용법', method: '온라인', link: 'https://meet.google.com/niv-wpuf-nku' },
            { month: '7월', date: '2026. 7. 14. (화)', time: '15:00~16:30', school: '횡계초등학교', name: '김단비', title: '노션 기초부터 활용까지', method: '온라인', link: 'https://meet.google.com/mzk-uxpt-uyu' },
            { month: '9월', date: '2026. 9. 16. (수)', time: '15:00~16:30', school: '송양초등학교', name: '송유미', title: 'AI를 활용한 그림책 만들기 수업 사례', method: '온라인', link: 'https://meet.google.com/bpi-oomc-yfd' },
            { month: '10월', date: '2026. 10. 14. (수)', time: '15:00~16:30', school: '교동초등학교', name: '김종완', title: '아이들의 디지털 웰니스 (체육교과와 SW)', method: '온라인', link: 'https://meet.google.com/tyw-uzgh-jcv' },
            { month: '11월', date: '추후 안내', time: '추후 안내', school: '대관령초등학교', name: '고규주', title: 'AI로 쉽게 구축하는 우리 학교 온라인 교무실', method: '오프라인', link: '대면' }
        ];

        const tbody = document.getElementById('schedule-body');

        scheduleData.forEach(item => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-blue-50/50 transition-colors group";
            
            const isOnline = item.method === '온라인';
            const methodBadge = isOnline 
                ? `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700 border border-green-200"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>온라인</span>` 
                : `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-orange-100 text-orange-700 border border-orange-200"><i class="fas fa-users text-orange-500"></i>오프라인</span>`;
            
            const actionButton = isOnline 
                ? `<a href="${item.link}" target="_blank" class="mt-2 inline-block text-xs font-medium text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-md transition-colors"><i class="fas fa-video mr-1"></i> Meet 참여</a>`
                : `<span class="mt-2 inline-block text-xs font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-md">${item.link}</span>`;

            tr.innerHTML = `
                <td class="px-6 py-5 whitespace-nowrap">
                    <span class="text-xl font-black text-slate-200 group-hover:text-blue-200 transition-colors">${item.month}</span>
                </td>
                <td class="px-6 py-5">
                    <div class="text-sm font-semibold text-slate-800 mb-1">${item.date}</div>
                    <div class="text-xs text-slate-500 flex items-center gap-1"><i class="far fa-clock"></i> ${item.time}</div>
                </td>
                <td class="px-6 py-5">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-sm">
                            ${item.name.charAt(0)}
                        </div>
                        <div>
                            <div class="text-sm font-bold text-slate-800">${item.name} <span class="font-normal text-slate-500 text-xs ml-1">선생님</span></div>
                            <div class="text-xs text-slate-500">${item.school}</div>
                        </div>
                    </div>
                </td>
                <td class="px-6 py-5 max-w-xs">
                    <div class="text-base font-bold text-slate-800 leading-snug group-hover:text-blue-600 transition-colors">${item.title}</div>
                </td>
                <td class="px-6 py-5 text-center whitespace-nowrap">
                    <div>${methodBadge}</div>
                    ${actionButton}
                </td>
            `;
            tbody.appendChild(tr);
        });
    </script>
</body>
</html>
